<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <title>⚡ 酷玩博客 | Cool Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-cyan: #00f5ff;
            --accent-magenta: #ff00aa;
            --accent-purple: #a855f7;
            --accent-yellow: #fbbf24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --gradient-1: linear-gradient(135deg, #00f5ff 0%, #a855f7 100%);
            --gradient-2: linear-gradient(135deg, #ff00aa 0%, #fbbf24 100%);
            --glow-cyan: 0 0 30px rgba(0, 245, 255, 0.3);
            --glow-magenta: 0 0 30px rgba(255, 0, 170, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-2%, 1%) rotate(-1deg); }
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            transition: all 0.3s ease;
        }

        header.scrolled {
            background: rgba(10, 10, 15, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: var(--glow-cyan); }
            50% { box-shadow: var(--glow-magenta); }
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--text-primary);
        }

        nav a:hover::after {
            width: 100%;
        }

        .write-btn {
            background: var(--gradient-1);
            color: var(--bg-primary);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .write-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #00f5ff 50%, #ff00aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 0, 170, 0.3)); }
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-left: 3.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Categories */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .category-tag {
            padding: 0.5rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .category-tag:hover, .category-tag.active {
            background: var(--gradient-1);
            color: var(--bg-primary);
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 245, 255, 0.2);
        }

        .post-card:hover::before {
            opacity: 1;
        }

        .post-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .post-card:hover .post-cover {
            transform: scale(1.05);
        }

        .post-cover-wrapper {
            overflow: hidden;
        }

        .post-content {
            padding: 1.5rem;
        }

        .post-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 245, 255, 0.1);
            color: var(--accent-cyan);
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .post-tag {
            padding: 0.2rem 0.5rem;
            background: rgba(168, 85, 247, 0.1);
            color: var(--accent-purple);
            border-radius: 10px;
            font-size: 0.7rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 4rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .posts-grid {
                grid-template-columns: 1fr;
            }
            
            nav {
                display: none;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span>Cool Blog</span>
            </a>
            <nav>
                <a href="/">🏠 首页</a>
                <a href="#categories">📂 分类</a>
                <a href="#about">👤 关于</a>
                <button class="write-btn" onclick="location.href='/write'">✏️ 写文章</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to Cool Blog</h1>
            <p>探索思想的星空，记录代码的浪漫 🚀</p>
        </section>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="搜索文章..." id="searchInput">
        </div>

        <div class="categories" id="categories">
            <span class="category-tag active" data-category="all">全部</span>
        </div>

        <div class="posts-grid" id="postsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <section id="about" style="padding: 4rem 2rem; max-width: 800px; margin: 0 auto;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">👤 关于我</h2>
        <div style="background: var(--bg-card); padding: 2rem; border-radius: 20px; line-height: 1.8;">
            <p>🎉 欢迎来到我的博客！</p>
            <p style="margin-top: 1rem;">这是一个使用 Spring Boot + 原生 HTML/CSS/JS 构建的酷炫博客系统。</p>
            <p style="margin-top: 1rem;">💡 专注于技术分享，记录编程生活的点滴。</p>
            <p style="margin-top: 1rem;">📧 联系我：hello@example.com</p>
        </div>
    </section>

    <footer>
        <p>🎨 Powered by Spring Boot | Built with ❤️ by OpenClaw</p>
    </footer>

    <script>
        let allPosts = [];
        let currentCategory = 'all';

        // Load posts
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                const data = await response.json();
                allPosts = data.posts;
                renderCategories(data.categories);
                renderPosts(allPosts);
            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('postsGrid').innerHTML = '<div class="loading">加载失败，请刷新页面</div>';
            }
        }

        // Render categories
        function renderCategories(categories) {
            const container = document.getElementById('categories');
            let html = '<span class="category-tag active" data-category="all">全部</span>';
            categories.forEach(cat => {
                html += `<span class="category-tag" data-category="${cat}">${cat}</span>`;
            });
            container.innerHTML = html;

            // Add click handlers
            container.querySelectorAll('.category-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    container.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentCategory = tag.dataset.category;
                    filterPosts();
                });
            });
        }

        // Filter posts
        function filterPosts() {
            let filtered = allPosts;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            const search = document.getElementById('searchInput').value;
            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(s) || 
                    p.content.toLowerCase().includes(s)
                );
            }
            
            renderPosts(filtered);
        }

        // Render posts
        function renderPosts(posts) {
            const grid = document.getElementById('postsGrid');
            
            if (posts.length === 0) {
                grid.innerHTML = '<div class="loading">暂无文章</div>';
                return;
            }

            grid.innerHTML = posts.map(post => {
                const date = new Date(post.createdAt).toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                return `
                    <article class="post-card" data-id="${post.id}" onclick="window.location.href='/post.html?id=' + this.dataset.id">
                        <div class="post-cover-wrapper">
                            <img src="${post.coverImage || 'https://picsum.photos/800/400'}" alt="${post.title}" class="post-cover">
                        </div>
                        <div class="post-content">
                            <span class="post-category">${post.category}</span>
                            <h2 class="post-title">${post.title}</h2>
                            <p class="post-excerpt">${post.content.substring(0, 150)}...</p>
                            <div class="post-meta">
                                <span class="post-author">👤 ${post.author || '匿名'}</span>
                                <span>📅 ${date}</span>
                            </div>
                            ${post.tags ? `<div class="post-tags">${post.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>` : ''}
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', filterPosts);

        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Initialize
        loadPosts();
    </script>
</body>
</html>
