<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <title>写文章 | Cool Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-cyan: #00f5ff;
            --accent-magenta: #ff00aa;
            --accent-purple: #a855f7;
            --accent-yellow: #fbbf24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --gradient-1: linear-gradient(135deg, #00f5ff 0%, #a855f7 100%);
            --gradient-2: linear-gradient(135deg, #ff00aa 0%, #fbbf24 100%);
            --glow-cyan: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 170, 0.05) 0%, transparent 50%);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95rem;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-ghost:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--gradient-1);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        /* Form */
        .editor-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .form-input.title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        textarea.form-input {
            min-height: 400px;
            resize: vertical;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            min-height: 50px;
        }

        .tags-input:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .tags-input input {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        .tag {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.4rem 0.75rem;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-purple);
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        /* Preview Toggle */
        .preview-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .toggle-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--gradient-1);
            color: var(--bg-primary);
            border-color: transparent;
        }

        /* Preview */
        .preview {
            display: none;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 2rem;
            min-height: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview.show {
            display: block;
        }

        .preview h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .preview h2 {
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem;
            color: var(--text-primary);
        }

        .preview h3 {
            font-size: 1.2rem;
            margin: 1rem 0 0.75rem;
        }

        .preview p {
            line-height: 1.8;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .preview code {
            background: var(--bg-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }

        .preview pre {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .preview pre code {
            background: none;
            padding: 0;
        }

        .preview ul, .preview ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--accent-cyan);
            background: rgba(0, 245, 255, 0.1);
        }

        .toast.error {
            border-color: var(--accent-magenta);
            background: rgba(255, 0, 170, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <header>
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span>Cool Blog</span>
            </a>
            <div class="header-actions">
                <button class="btn btn-ghost" onclick="location.href='/'">取消</button>
                <button class="btn btn-primary" onclick="publishPost()">发布文章</button>
            </div>
        </div>
    </header>

    <div class="editor-container">
        <div class="form-group">
            <input type="text" class="form-input title" id="title" placeholder="输入文章标题..." maxlength="100">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">分类</label>
                <select class="form-input" id="category">
                    <option value="">选择分类</option>
                    <option value="技术">技术</option>
                    <option value="生活">生活</option>
                    <option value="随笔">随笔</option>
                    <option value="公告">公告</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">封面图片 URL</label>
                <input type="text" class="form-input" id="coverImage" placeholder="https://...">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">标签</label>
            <div class="tags-input" id="tagsInput">
                <input type="text" id="tagInput" placeholder="输入标签按回车添加">
            </div>
            <p class="form-hint">按回车添加标签</p>
        </div>

        <div class="preview-toggle">
            <button class="toggle-btn active" id="editBtn" onclick="showEditor()">✏️ 编辑</button>
            <button class="toggle-btn" id="previewBtn" onclick="showPreview()">👁 预览</button>
        </div>

        <div class="form-group">
            <textarea class="form-input" id="content" placeholder="在这里写文章内容...

支持 Markdown 语法：
## 标题
**粗体** *斜体*
- 列表项
1. 有序列表
`代码`
[链接](url)
"></textarea>
        </div>

        <div class="preview" id="preview"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const tags = [];

        // Tags handling
        document.getElementById('tagInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = e.target.value.trim();
                if (value && !tags.includes(value)) {
                    tags.push(value);
                    renderTags();
                }
                e.target.value = '';
            }
        });

        function renderTags() {
            const container = document.getElementById('tagsInput');
            const input = document.getElementById('tagInput');
            container.innerHTML = '';
            tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerHTML = `${tag} <span class="tag-remove" onclick="removeTag('${tag}')">×</span>`;
                container.appendChild(span);
            });
            container.appendChild(input);
        }

        function removeTag(tag) {
            const index = tags.indexOf(tag);
            if (index > -1) {
                tags.splice(index, 1);
                renderTags();
            }
        }

        // Preview
        function showPreview() {
            document.getElementById('editBtn').classList.remove('active');
            document.getElementById('previewBtn').classList.add('active');
            document.getElementById('content').style.display = 'none';
            
            const preview = document.getElementById('preview');
            preview.classList.add('show');
            
            const content = document.getElementById('content').value;
            preview.innerHTML = renderMarkdown(content);
        }

        function showEditor() {
            document.getElementById('editBtn').classList.add('active');
            document.getElementById('previewBtn').classList.remove('active');
            document.getElementById('content').style.display = 'block';
            document.getElementById('preview').classList.remove('show');
        }

        function renderMarkdown(content) {
            let html = content
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            html = html.replace(/(<li>.*<\/li>)+/g, '<ul>$&</ul>');
            return `<p>${html}</p>`;
        }

        // Publish
        async function publishPost() {
            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value.trim();
            const coverImage = document.getElementById('coverImage').value.trim();

            if (!title || !category || !content) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const post = {
                title,
                category,
                content,
                author: 'OpenClaw',
                tags,
                coverImage: coverImage || `https://picsum.photos/800/400?random=${Date.now()}`
            };

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(post)
                });

                if (response.ok) {
                    showToast('发布成功！', 'success');
                    setTimeout(() => location.href = '/', 1500);
                } else {
                    showToast('发布失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
